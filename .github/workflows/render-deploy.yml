name: Render Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Install Render CLI
        run: |
          curl -L https://github.com/render-oss/cli/releases/download/v2.15.1/cli_2.15.1_linux_amd64.zip -o render.zip
          unzip render.zip
          sudo mv cli_v2.15.1 /usr/local/bin/render
          render --version

      - name: Trigger Render Deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
          CI: true
        run: |
          render deploys create $RENDER_SERVICE_ID --output json --confirm --wait
